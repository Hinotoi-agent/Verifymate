<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Verifymate logo</title>
  <desc id="desc">A chess knight inside a shield with a verification check mark.</desc>
  <defs>
    <linearGradient id="bg" x1="96" y1="64" x2="416" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="150" y1="150" x2="390" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#F8FAFC"/>
  <path d="M256 54 416 116v120c0 104-61 178-160 222C157 414 96 340 96 236V116L256 54Z" fill="url(#bg)" filter="url(#shadow)"/>
  <path d="M256 84 386 134v101c0 85-47 146-130 185-83-39-130-100-130-185V134l130-50Z" fill="none" stroke="#334155" stroke-width="8"/>

  <!-- Knight body -->
  <path d="M181 347h164l-18 55H162l19-55Z" fill="#E5E7EB"/>
  <path d="M203 347c14-40 37-66 68-83 17-9 23-29 7-45l-26-26c-10-10-9-26 3-34l55-38c11-8 27-4 34 8l28 49c8 14 5 32-8 43l-39 33c-16 14-19 38-7 55l27 38H203Z" fill="#F8FAFC"/>
  <path d="M249 188 218 164c-8-6-6-18 4-22l32-12 1 58Z" fill="#F8FAFC"/>
  <path d="M292 160c8 0 14 6 14 14s-6 14-14 14-14-6-14-14 6-14 14-14Z" fill="#0F172A"/>
  <path d="M351 211c-25 2-51-2-78-13" fill="none" stroke="#CBD5E1" stroke-width="10" stroke-linecap="round"/>

  <!-- Verification mark -->
  <circle cx="356" cy="343" r="62" fill="url(#accent)" stroke="#064E3B" stroke-width="8"/>
  <path d="m326 342 20 20 42-50" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
